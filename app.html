<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0078d4" />
    <title>Takip — Çalışma Programı</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="assets/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

    <!-- Vendor CSS (CDN) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Core + Page CSS -->
    <link rel="stylesheet" href="css/core/theme.css?v=1" />
    <link rel="stylesheet" href="css/pages/app.css?v=1" />
</head>

<body>

    <header class="app-bar">
        <div class="app-bar-inner">
            <a class="app-logo app-back" href="programs.html"
               title="Programlara dön" aria-label="Programlara dön">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div class="app-bar-title">
                <span class="app-name js-app-name"></span>
                <span class="app-sub js-app-sub"></span>
            </div>

            <div class="app-overall">
                <div class="overall-text">
                    <span class="js-overall-pct overall-pct">0%</span>
                    <span class="js-overall-count text-muted"></span>
                </div>
                <div class="progress overall-progress">
                    <div class="progress-bar js-overall-bar" role="progressbar"
                         aria-label="Genel ilerleme" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
            </div>

            <div class="app-user">
                <span class="user-avatar js-avatar" aria-hidden="true"></span>
                <button type="button" id="signOutBtn" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="d-none d-sm-inline ms-1">Çıkış</span>
                </button>
            </div>
        </div>
    </header>

    <main class="app-main container py-3">
        <div id="loading" class="text-center text-muted py-5">
            <div class="spinner-border" role="status" aria-hidden="true"></div>
            <p class="mt-2 mb-0">Yükleniyor…</p>
        </div>
        <div class="accordion" id="phaseAccordion"></div>
    </main>

    <!-- ─── Templates (render: <template> + .text()) ─────────────────── -->

    <template id="tplPhase">
        <div class="accordion-item phase-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button"
                        data-bs-toggle="collapse">
                    <span class="phase-title js-title"></span>
                    <span class="phase-count js-count badge"></span>
                </button>
            </h2>
            <div class="accordion-collapse collapse" data-bs-parent="#phaseAccordion">
                <div class="accordion-body js-weeks"></div>
            </div>
        </div>
    </template>

    <template id="tplWeek">
        <div class="week-card">
            <button type="button" class="week-head collapsed" data-bs-toggle="collapse">
                <span class="week-no js-no"></span>
                <span class="week-info">
                    <span class="week-title js-title"></span>
                    <span class="week-episode js-episode"></span>
                </span>
                <span class="week-meta">
                    <span class="week-count js-count"></span>
                    <span class="progress week-progress">
                        <span class="progress-bar js-bar" role="progressbar"
                              aria-valuemin="0" aria-valuemax="100"></span>
                    </span>
                    <i class="bi bi-chevron-down week-chevron" aria-hidden="true"></i>
                </span>
            </button>
            <div class="week-body collapse">
                <p class="week-summary js-summary"></p>
                <p class="week-source">
                    <i class="bi bi-link-45deg" aria-hidden="true"></i>
                    <span class="week-source-label">Kaynak:</span>
                    <span class="js-source"></span>
                </p>
                <div class="js-tasks"></div>
                <div class="recurring-block">
                    <span class="recurring-head">
                        <i class="bi bi-arrow-repeat" aria-hidden="true"></i> Haftalık sabit görevler
                    </span>
                    <div class="js-recurring"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="tplTask">
        <div class="form-check task-row">
            <input class="form-check-input js-check" type="checkbox" />
            <label class="form-check-label js-label">
                <span class="day-badge js-day"></span>
                <span class="task-text js-text"></span>
            </label>
        </div>
    </template>

    <!-- Vendor JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Core helpers -->
    <script src="js/core/kt-config.js?v=1"></script>
    <script src="js/core/kt-swal.js?v=1"></script>
    <script src="js/core/kt-helpers.js?v=1"></script>
    <script src="js/core/kt-data.js?v=3"></script>
    <script src="js/core/kt-auth.js?v=2"></script>
    <script src="js/core/kt-pwa.js?v=1"></script>

    <!-- Page JS -->
    <script src="js/pages/app.js?v=3"></script>

</body>

</html>
