<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0078d4" />
    <title>Programlarım — Çalışma Takibi</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="assets/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

    <!-- Vendor CSS (CDN) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Core + Page CSS -->
    <link rel="stylesheet" href="css/core/theme.css?v=60a6a8ad" />
    <link rel="stylesheet" href="css/pages/programs.css?v=9052dd1f" />
</head>

<body>

    <header class="app-bar">
        <div class="app-bar-inner">
            <span class="app-logo" aria-hidden="true">
                <i class="bi bi-collection-fill"></i>
            </span>
            <div class="app-bar-title">
                <span class="app-name">Programlarım</span>
                <span class="app-sub">Çalışma planı seç</span>
            </div>

            <div class="app-user">
                <span class="user-avatar js-avatar" aria-hidden="true"></span>
                <button type="button" id="signOutBtn" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="d-none d-sm-inline ms-1">Çıkış</span>
                </button>
            </div>
        </div>
    </header>

    <main class="app-main container py-4">
        <div id="loading" class="text-center text-muted py-5">
            <div class="spinner-border" role="status" aria-hidden="true"></div>
            <p class="mt-2 mb-0">Yükleniyor…</p>
        </div>

        <section id="todayPanel" class="today-panel d-none">
            <div class="today-head">
                <h2 class="today-title js-today-date"></h2>
                <div class="stat-chips">
                    <span class="stat-chip" title="Üst üste görev tamamladığın gün sayısı">
                        🔥 <strong class="js-stat-streak">0</strong> gün seri
                    </span>
                    <span class="stat-chip" title="Bugün tamamlanan görev">
                        ✅ Bugün <strong class="js-stat-today">0</strong>
                    </span>
                    <span class="stat-chip" title="Bu hafta (Pzt'den beri) tamamlanan görev">
                        📅 Bu hafta <strong class="js-stat-week">0</strong>
                    </span>
                </div>
            </div>
            <div id="todayGroups"></div>
            <p id="todayEmpty" class="today-empty d-none"></p>
        </section>

        <h2 class="section-title">Programlar</h2>
        <div id="programGrid" class="program-grid"></div>
    </main>

    <!-- ─── Templates ────────────────────────────────────────────── -->
    <template id="tplTodayGroup">
        <div class="today-group">
            <a class="today-group-head" href="#">
                <i class="js-icon" aria-hidden="true"></i>
                <span class="js-program fw-semibold"></span>
                <span class="js-week today-week-badge"></span>
            </a>
            <div class="js-today-tasks"></div>
        </div>
    </template>

    <template id="tplTodayTask">
        <div class="form-check task-row">
            <input class="form-check-input js-check" type="checkbox" />
            <label class="form-check-label js-label">
                <span class="day-badge js-day"></span>
                <span class="task-text js-text"></span>
            </label>
        </div>
    </template>

    <template id="tplProgram">
        <a class="program-card" href="#">
            <span class="program-icon" aria-hidden="true"><i class="js-icon"></i></span>
            <span class="program-info">
                <span class="program-title js-title"></span>
                <span class="program-desc js-desc"></span>
                <span class="program-meta">
                    <span class="program-duration js-duration badge"></span>
                    <span class="program-count js-count"></span>
                </span>
                <span class="progress program-progress">
                    <span class="progress-bar js-bar" role="progressbar"
                          aria-valuemin="0" aria-valuemax="100"></span>
                </span>
            </span>
            <i class="bi bi-chevron-right program-chevron" aria-hidden="true"></i>
        </a>
    </template>

    <!-- Vendor JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Core helpers -->
    <script src="js/core/kt-config.js?v=2df99597"></script>
    <script src="js/core/kt-swal.js?v=dacb6b84"></script>
    <script src="js/core/kt-helpers.js?v=04298fb5"></script>
    <script src="js/core/kt-data.js?v=703fa1a5"></script>
    <script src="js/core/kt-auth.js?v=a96a64c8"></script>
    <script src="js/core/kt-pwa.js?v=535a8f8a"></script>

    <!-- Page JS -->
    <script src="js/pages/programs.js?v=d3878f8f"></script>

</body>

</html>
