<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0078d4" />
    <title>Giriş — Çalışma Programı Takip</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="assets/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

    <!-- Vendor CSS (CDN) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Core + Page CSS -->
    <link rel="stylesheet" href="css/core/theme.css?v=1" />
    <link rel="stylesheet" href="css/pages/login.css?v=1" />
</head>

<body>

    <main class="login-wrap">
        <div class="login-card">

            <div class="login-brand">
                <span class="login-logo" aria-hidden="true">
                    <i class="bi bi-journal-bookmark-fill"></i>
                </span>
                <div>
                    <h1 class="login-title">İngilizce Master Plan</h1>
                    <p class="login-subtitle">B1’den C1’e — 56 haftalık takip</p>
                </div>
            </div>

            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label">E-posta</label>
                    <input type="email" id="email" class="form-control"
                           autocomplete="username" required />
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Şifre</label>
                    <input type="password" id="password" class="form-control"
                           autocomplete="current-password" required />
                </div>

                <button type="submit" id="loginSubmit" class="btn btn-primary w-100">
                    Giriş yap
                </button>
            </form>

        </div>
    </main>

    <!-- Vendor JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Core helpers -->
    <script src="js/core/kt-config.js?v=1"></script>
    <script src="js/core/kt-swal.js?v=1"></script>
    <script src="js/core/kt-helpers.js?v=1"></script>
    <script src="js/core/kt-auth.js?v=2"></script>
    <script src="js/core/kt-pwa.js?v=1"></script>

    <!-- Page JS -->
    <script src="js/pages/login.js?v=2"></script>

</body>

</html>
